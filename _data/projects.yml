# Research projects, grouped by theme, rendered as cards on /projects/.
#
# To add an image to a card later: drop the file in images/projects/ and set
#   image: /images/projects/my-file.jpg
# Landscape works best (it is cropped to a 16:9 frame, centred). Leave `image`
# empty to show the subtle accent header with the icon instead.
# `icon` is any Font Awesome solid name (https://fontawesome.com/search?s=solid).
# `type` on a link controls its icon: omit for a paper, or use code / video.

- theme: "Human augmentation & EMG"
  projects:
    - title: "Motor-learning control for supernumerary degrees of freedom"
      period: "PhD project · 2022 – present"
      icon: "fa-wave-square"
      image:
      description: "Non-invasive neural interfaces for human augmentation: high-density surface EMG is decomposed into individual motoneuron signals, adding controllable dimensions without disrupting natural motor control."
      tags: ["HD-EMG", "Motor unit decomposition", "Time-series regression"]
      links:
        - label: "Finger force prediction (NER 2025)"
          url: "https://cmsfiles.s3.amazonaws.com/ner2025/proceedings/61569_CFP25CNE-ART/pdfs/0001194.pdf"
        - label: "Motor unit tracking (NER 2025)"
          url: "https://cmsfiles.s3.amazonaws.com/ner2025/proceedings/61569_CFP25CNE-ART/pdfs/0000634.pdf"
        - label: "MU decomposition, intrinsic hand muscles"
          url: "https://link.springer.com/chapter/10.1007/978-3-031-85000-4_25"
        - label: "Piano with a robotic third thumb (Sci. Reports)"
          url: "https://www.nature.com/articles/s41598-021-00376-6"
    - title: "Prediction of human ability for supernumerary control"
      period: "MSc project · 2019"
      icon: "fa-hand"
      image:
      description: "How motor-skill proficiency influences the ability to control a supernumerary robotic finger while playing the piano, measured through hand, foot and piano dexterity experiments."
      tags: ["Human augmentation", "Motor skills", "Supernumerary robotics"]
      links:
        - label: "Scientific Reports"
          url: "https://www.nature.com/articles/s41598-021-00376-6"
    - title: "Body-powered supernumerary robotic finger (bpSRF)"
      period: ""
      icon: "fa-gears"
      image:
      description: "A lightweight extra finger that enhances grasping using only wrist movement — no electronic components, relying purely on body-powered mechanisms."
      tags: ["Assistive robotics", "Supernumerary limbs", "Grasping"]
      links:
        - label: "ICORR 2025"
          url: "https://ieeexplore.ieee.org/document/11063063"
        - label: "GitHub – bpSRF"
          url: "https://github.com/renatomio/bpSRF"
          type: "code"
    - title: "Supernumerary fingers for cylindrical and pinch grasps"
      period: "2022 – present"
      icon: "fa-hand-scissors"
      image:
      description: "A wearable device with two extra robotic fingers supporting power and precision grasps for users with motor impairments, using intuitive wrist-based control."
      tags: ["Assistive robotics", "Supernumerary limbs", "Grasping"]
      links:
        - label: "IEEE BioSMART 2023"
          url: "https://ieeexplore.ieee.org/document/10162114"

